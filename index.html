<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Martini Project | Finder</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <style>
    :root {
      --primary-dark: #042b04;
      --bg-light: #fefcf1;
      --accent-red: #da291c;
      --card-bg: #ffffff;
      --text-muted: #555555;
      --border-radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light);
      color: var(--primary-dark);
      padding: 20px;
      margin: 0;
      line-height: 1.5;
    }

    h1, h2, h3, .brand-font {
      font-family: 'Young Serif', serif;
      margin: 0;
    }

    /* Container & Layout */
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Filter Widget Header */
    .filter-widget {
      margin-bottom: 30px;
    }

    .filter-widget h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-align: center;
    }

    .filter-controls {
      background: var(--card-bg);
      border: 2px solid var(--primary-dark);
      border-radius: var(--border-radius);
      padding: 20px;
      box-shadow: 4px 4px 0px rgba(4, 43, 4, 0.1);
    }

    .filter-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-label {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .location-select {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      padding: 10px 16px;
      border: 2px solid var(--primary-dark);
      border-radius: 8px;
      background-color: var(--bg-light);
      color: var(--primary-dark);
      cursor: pointer;
      font-size: 1rem;
    }

    /* Filter Pills */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .filters label {
      background-color: transparent;
      border: 1px solid var(--primary-dark);
      color: var(--primary-dark);
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .filters input[type="checkbox"] {
      display: none;
    }

    .filters input[type="checkbox"]:checked + label {
      background-color: var(--primary-dark);
      color: var(--bg-light);
      box-shadow: 0 2px 6px rgba(4, 43, 4, 0.3);
    }

    .clear-button {
      padding: 8px 16px;
      background-color: transparent;
      color: var(--accent-red);
      border: 1px solid var(--accent-red);
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      margin-left: auto;
      transition: all 0.2s ease;
    }

    .clear-button:hover {
      background-color: var(--accent-red);
      color: white;
    }

    .active-filters {
      margin-top: 15px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Results Grid */
    .bar-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    /* Bar Cards */
    .bar-item {
      display: flex;
      flex-direction: column;
      background-color: var(--card-bg);
      border: 2px solid var(--primary-dark);
      border-radius: var(--border-radius);
      padding: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }

    .bar-item:hover {
      transform: translateY(-4px);
      box-shadow: 6px 6px 0px rgba(4, 43, 4, 0.15);
    }

    .bar-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .bar-item h3 {
      font-size: 1.4rem;
      color: var(--primary-dark);
      line-height: 1.2;
      flex: 1;
      padding-right: 10px;
    }

    .bar-item .score {
      font-weight: 600;
      font-size: 1rem;
      background: var(--primary-dark);
      color: var(--bg-light);
      padding: 4px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .score .material-icons {
      font-size: 16px;
      color: var(--accent-red);
    }

    .bar-location {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      border-bottom: 2px solid #eee;
      padding-bottom: 12px;
    }

    .description {
      margin-bottom: 20px;
      flex-grow: 1;
      font-size: 1rem;
      color: #333;
    }

    /* Tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .tags span {
      background-color: #f0eee1;
      color: var(--primary-dark);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Pour Strength Segmented Bar */
    .pour-strength-container {
      margin-bottom: 20px;
    }
    
    .pour-strength-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .pour-strength-bar {
      display: flex;
      background-color: #e9e6d3;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #d0cdbc;
    }

    .pour-strength-bar span {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      border-right: 1px solid #d0cdbc;
    }

    .pour-strength-bar span:last-child {
      border-right: none;
    }

    .pour-strength-bar .active {
      background-color: var(--primary-dark);
      color: var(--bg-light);
    }

    /* Action Button */
    .bar-item a {
      display: block;
      background-color: var(--bg-light);
      color: var(--primary-dark);
      border: 2px solid var(--primary-dark);
      font-weight: 600;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      transition: all 0.2s ease;
      margin-top: auto;
    }

    .bar-item a:hover {
      background-color: var(--primary-dark);
      color: var(--bg-light);
    }

    /* Mobile Adjustments */
    @media (max-width: 768px) {
      .filter-widget h2 {
        font-size: 2rem;
      }
      .filter-controls {
        padding: 15px;
      }
      .filter-header-row {
        flex-direction: column;
        align-items: stretch;
      }
      .clear-button {
        margin-left: 0;
        width: 100%;
        margin-top: 10px;
      }
      .location-select {
        width: 100%;
      }
      .bar-results {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <div class="bar-results" id="barResults">

</div>

    { name: "Oscar Wilde", score: 3.1, description: "Amazing decor which elevates the already pretty good dirty martini.", tags: ["Date Night"], location: "Manhattan", neighborhood: "NoMad", pour: "Dirty", maps_link: "https://maps.app.goo.gl/n4KusVKJgrQP9AgJA" },
    { name: "Shy Shy", score: 3.6, description: "A great Martini happy hour, if you can grab a seat, take it.", tags: ["After Work", "Date Night", "Happy Hour"], location: "Manhattan", neighborhood: "Chelsea", pour: "Filthy", maps_link: "https://maps.app.goo.gl/jG7sNFQd83a3QAX19" },
    { name: "Jungle Bird", score: 2.9, description: "Solid martini, with plenty of standing space and cute vibe.", tags: ["Good for Groups", "After Work"], location: "Manhattan", neighborhood: "Chelsea", pour: "Dirty", maps_link: "https://maps.app.goo.gl/QPL7kqgNYy7UveaP9" },
    { name: "Ruby’s Cafe", score: 2.0, description: "Cute spot, but the martini’s more ‘meh’ than magic.", tags: ["Date Night"], location: "Manhattan", neighborhood: "West Village", pour: "Strong", maps_link: "https://www.google.com/maps/search/?api=1&query=Ruby%27s+Cafe+New+York" }
  ];

  function renderBars(data) {
    const container = document.getElementById('barResults');
    container.innerHTML = '';
    
    // Sort highest score first
    data.sort((a, b) => b.score - a.score);
    
    data.forEach(bar => {
      // Build the upgraded strength scale
      const strengthScale = pourLevels.map(level => {
        const activeClass = level === bar.pour ? 'active' : '';
        return `<span class="${activeClass}">${level}</span>`;
      }).join('');
      
      const el = document.createElement('div');
      el.className = 'bar-item';
      el.innerHTML = `
        <div class="bar-header">
          <h3>${bar.name}</h3>
          <div class="score"><span class="material-icons">local_bar</span>${bar.score}</div>
        </div>
        <div class="bar-location">${bar.neighborhood}, ${bar.location}</div>
        <div class="description">${bar.description}</div>
        <div class="tags">${bar.tags.map(t => `<span>${t}</span>`).join('')}</div>
        <div class="pour-strength-container">
          <div class="pour-strength-label">Pour Profile</div>
          <div class="pour-strength-bar">${strengthScale}</div>
        </div>
        <a href="${bar.maps_link}" target="_blank">Take Me There</a>
      `;
      container.appendChild(el);
    });
  }

  function clearFilters() {
    document.querySelectorAll('.filters input').forEach(i => i.checked = false);
    document.getElementById('location').value = '';
    document.getElementById('activeFilters').textContent = '';
    renderBars(bars);
  }

  function filterBars() {
    const selectedTags = Array.from(document.querySelectorAll('.filters input:checked')).map(i => i.value);
    const selectedLocation = document.getElementById('location').value;
    const active = [];
    
    let filtered = bars;
    
    if (selectedLocation) {
      filtered = filtered.filter(b => b.location === selectedLocation);
      active.push(selectedLocation);
    }
    
    if (selectedTags.length) {
      filtered = filtered.filter(b => selectedTags.every(tag => b.tags.includes(tag)));
      active.push(...selectedTags);
    }
    
    document.getElementById('activeFilters').textContent = active.length ? `Active Filters: ${active.join(' • ')}` : '';
    renderBars(filtered);
  }

  window.onload = () => {
    renderBars(bars);
    document.querySelectorAll('.filters input').forEach(i => i.addEventListener('change', filterBars));
    document.getElementById('location').addEventListener('change', filterBars);
  };
</script>
</body>
