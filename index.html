<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Martini Project</title>
    
    <style>
        /* --- COLOR PALETTE --- */
        :root {
            --pimento: #ff0b0b;
            --espresso: #3b1b10;
            --brine-time: #618f62;
            --filthy: #032b03;
            --vermouth: #fffcf1;
        }

        /* --- BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--vermouth); 
            /* We will definitely need a bolder font later, but keeping Courier for now */
            font-family: 'Courier New', Courier, monospace; 
            color: var(--filthy);
        }

        /* --- BLOCK 1: HEADER (Revised) --- */
        header {
            /* Using a gradient instead of solid color for more life */
            background: linear-gradient(135deg, var(--filthy) 20%, var(--brine-time) 100%);
            
            /* A thick, dashed border feels more retro and less "grid-like" */
            border-bottom: 8px dashed var(--pimento);
            
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Placeholder styling - making it funkier */
        .logo-placeholder {
            border: 4px solid var(--vermouth);
            background-color: var(--espresso);
            color: var(--vermouth);
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            z-index: 1;
            
            /* A much harsher, bigger drop shadow for a sticker/ticket effect */
            box-shadow: 8px 8px 0px var(--pimento); 
            
            /* A slight rotation adds dynamic energy (maximalism!) */
            transform: rotate(-3deg);
        }

        /* The class we will use once you upload the actual image */
        .header-logo {
            max-height: 90px; 
            width: auto;
            z-index: 1;
            /* We might want to rotate the actual logo slightly too when it arrives */
            /* transform: rotate(-3deg); */ 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-placeholder">
            Logo Goes Here
        </div>
        
        </header>

</body>
</html>
