<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Martini Project</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- THE MARTINI PROJECT PALETTE --- */
        :root {
            --pimento: #ff0b0b;
            --espresso: #3b1b10;
            --brine-time: #618f62;
            --filthy: #032b03;
            --vermouth: #fffcf1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--vermouth);
            color: var(--filthy);
            font-family: 'DM Serif Display', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BLOCK 1: HEADER --- */
        header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--filthy);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .logo-wrapper {
            width: 100%;
            max-width: 700px; 
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-decoration: none;
        }
        
        .placeholder-text {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--pimento);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1;
        }

        .logo-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            display: none; 
        }

        @media (max-width: 768px) {
            header {
                padding: 2rem 1rem;
            }
        }

        /* --- BLOCK 2 (OPTION 2): TYPOGRAPHIC CLASH --- */
        .clash-marquee-container {
            position: relative;
            height: 160px; /* Gives room for the overlap */
            overflow: hidden;
            background-color: var(--vermouth);
            border-bottom: 2px solid var(--filthy);
            display: flex;
            align-items: center;
        }

        .marquee-row {
            white-space: nowrap;
            position: absolute;
            display: flex;
        }

        /* Background Text (Slow, Tall, Filthy Green) */
        .row-back {
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.15; /* Subtle background presence */
        }
        .row-back .track {
            display: inline-block;
            animation: scrollRight 45s linear infinite;
        }
        .row-back span {
            font-family: 'Oswald', sans-serif;
            font-size: 8rem; /* Massive scale */
            color: var(--filthy);
            text-transform: uppercase;
            font-weight: 700;
            padding-right: 2rem;
            line-height: 1;
        }

        /* Foreground Text (Faster, Chunky Italic, Pimento Red) */
        .row-front {
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }
        .row-front .track {
            display: inline-block;
            animation: scrollLeft 25s linear infinite;
        }
        .row-front span {
            font-family: 'DM Serif Display', serif;
            font-size: 3.5rem;
            color: var(--pimento);
            font-style: italic;
            padding-right: 4rem;
            line-height: 1;
        }

        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @keyframes scrollRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="/" class="logo-wrapper" aria-label="The Martini Project Home">
                <span class="placeholder-text">Long Logo<br>Here</span>
                <img class="logo-img" src="YOUR_GITHUB_RAW_IMAGE_URL" alt="The Martini Project Logo">
            </a>
        </div>
    </header>

    <section class="clash-marquee-container">
        
        <div class="marquee-row row-back">
            <div class="track">
                <span>THE MARTINI PROJECT</span>
                <span>THE MARTINI PROJECT</span>
                <span>THE MARTINI PROJECT</span>
            </div>
            <div class="track">
                <span>THE MARTINI PROJECT</span>
                <span>THE MARTINI PROJECT</span>
                <span>THE MARTINI PROJECT</span>
            </div>
        </div>

        <div class="marquee-row row-front">
            <div class="track">
                <span>The Martini Project</span>
                <span>The Martini Project</span>
                <span>The Martini Project</span>
                <span>The Martini Project</span>
            </div>
            <div class="track">
                <span>The Martini Project</span>
                <span>The Martini Project</span>
                <span>The Martini Project</span>
                <span>The Martini Project</span>
            </div>
        </div>

    </section>

</body>
</html>
