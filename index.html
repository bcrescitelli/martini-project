<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Martini Project</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- THE MARTINI PROJECT PALETTE --- */
        :root {
            --pimento: #ff0b0b;
            --espresso: #3b1b10;
            --brine-time: #618f62;
            --filthy: #032b03;
            --vermouth: #fffcf1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--vermouth);
            color: var(--filthy);
            font-family: 'DM Serif Display', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BLOCK 1: HEADER --- */
        header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--filthy);
        }

        nav.nav-links {
            display: flex;
            gap: 2rem;
            flex: 1;
        }

        nav.nav-links.right {
            justify-content: flex-end;
        }

        nav.nav-links a {
            color: var(--filthy);
            text-decoration: none;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s ease;
        }

        nav.nav-links a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--pimento);
            transform: scaleX(0);
            transform-origin: bottom right;
            transition: transform 0.3s ease-out;
        }

        nav.nav-links a:hover {
            color: var(--pimento);
        }

        nav.nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* Centered Logo Container */
        .logo-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-wrapper {
            width: 350px; 
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-decoration: none;
        }
        
        /* Placeholder styling (will hide when image is added) */
        .placeholder-text {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--pimento);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1;
        }

        .logo-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            display: none; /* Change to 'block' when you add your image URL */
        }

        /* Responsive adjustment for smaller screens */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 2rem;
                padding: 2rem 1rem;
            }
            nav.nav-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-links left">
            <a href="/">Home</a>
        </nav>

        <div class="logo-container">
            <a href="/" class="logo-wrapper" aria-label="The Martini Project Home">
                <span class="placeholder-text">Logo<br>Here</span>
                
                <img class="logo-img" src="YOUR_GITHUB_RAW_IMAGE_URL" alt="The Martini Project Logo">
            </a>
        </div>

        <nav class="nav-links right">
            <a href="/dirty-thoughts">Dirty Thoughts Blog</a>
        </nav>
    </header>

</body>
</html>
