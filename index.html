<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Martini Project</title>
    
    <style>
        /* --- COLOR PALETTE --- */
        :root {
            --pimento: #ff0b0b;
            --espresso: #3b1b10;
            --brine-time: #618f62;
            --filthy: #032b03;
            --vermouth: #fffcf1;
        }

        /* --- BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Majority whitespace is Vermouth */
            background-color: var(--vermouth); 
            font-family: 'Courier New', Courier, monospace; 
            color: var(--filthy);
        }

        /* --- BLOCK 1: HEADER --- */
        header {
            /* Filthy as the prominent, heavy color */
            background-color: var(--filthy); 
            /* Pimento red for a punchy, maximalist separation line */
            border-bottom: 6px solid var(--pimento); 
            padding: 1.5rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle retro dot-matrix overlay effect */
        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(var(--brine-time) 1.5px, transparent 1.5px);
            background-size: 12px 12px;
            opacity: 0.2;
            pointer-events: none;
        }

        /* Placeholder styling */
        .logo-placeholder {
            border: 3px solid var(--espresso);
            background-color: var(--vermouth);
            color: var(--filthy);
            padding: 1rem 2rem;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            z-index: 1;
            /* Harsh drop shadow using Pimento for that retro print feel */
            box-shadow: 5px 5px 0px var(--pimento); 
        }

        /* The class we will use once you upload the actual image */
        .header-logo {
            max-height: 80px; 
            width: auto;
            z-index: 1;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-placeholder">
            Logo Goes Here
        </div>
        
        </header>

</body>
</html>
